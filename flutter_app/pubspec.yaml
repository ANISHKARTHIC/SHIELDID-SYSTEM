name: pub_entry_app
description: "Pub Entry Security - Mobile ID Verification & Face Age Scanner"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.2
  camera: ^0.11.0+2
  local_auth: ^3.0.2
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^9.2.2
  image_picker: ^1.1.2
  fl_chart: ^0.69.0
