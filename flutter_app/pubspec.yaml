  google_mlkit_face_detection: ^0.12.0
  path_provider: ^2.1.6
  permission_handler: ^11.3.1
  lottie: ^3.2.0
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  sqflite: ^2.4.3
